name = "care-royal"
pages_build_output_dir = "out"
compatibility_date = "2024-01-01"

# Care Royal is a fully client-side app: Next.js static export (this repo) +
# Firebase (Auth + Firestore) as the ONLY backend. There are no server
# functions and no secrets to set here — the Firebase web config in
# app/lib/firebase.ts is public by design and access is enforced by
# firestore.rules. Cloudflare Pages only serves the static `out/` bundle.
